<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ .Title }}</title>
  <link rel="stylesheet" href="{{ "css/styles.css" | relURL }}">
</head>
<body>

  {{ partial "global-header.html" (dict "showBack" false) }}

  <div class="site-layout-wrapper">
    <!-- Shared Sidebar component across all pages -->
    {{ partial "sidebar.html" . }}
    
    <main class="main-content-window">
      <!-- Unique page layouts inject their custom code blocks here -->
      {{ block "main" . }}{{ end }}
    </main>
  </div>

  <script>window.DEMOS_URL = "{{ "data/demos.json" | relURL }}?v={{ now.Unix }}";</script>
  {{ $js := resources.Get "js/filter.js" | fingerprint }}
  <script src="{{ $js.RelPermalink }}" integrity="{{ $js.Data.Integrity }}" crossorigin="anonymous"></script>
</body>
</html>
