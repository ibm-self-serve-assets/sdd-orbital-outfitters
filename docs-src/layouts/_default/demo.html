<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ .Title }}</title>
  <link rel="stylesheet" href="{{ "css/styles.css" | relURL }}">
</head>
<body>

  {{ partial "global-header.html" (dict "showBack" true) }}

  <!-- ==================== DEMO DETAIL CONTENT ==================== -->
  <main class="demo-detail-page">
    <div class="demo-detail-content" id="demoDetailContent">
      <!-- populated by JS -->
    </div>
  </main>

  <script>window.DEMOS_URL = "{{ "data/demos.json" | relURL }}?v={{ now.Unix }}";</script>
  {{ $js := resources.Get "js/filter.js" | fingerprint }}
  <script src="{{ $js.RelPermalink }}" integrity="{{ $js.Data.Integrity }}" crossorigin="anonymous"></script>
</body>
</html>
